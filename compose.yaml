services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
    command: sleep infinity
    tty: true

volumes:
  node_modules:
