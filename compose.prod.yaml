services:
  app:
    container_name: personal-site-app
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: prod
    networks:
      - proxy-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  proxy-network:
    name: personal_site
    external: true
